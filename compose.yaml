# UCM Coffee Studio POS — local dev environment.
# Usage (after review):
#   docker compose build
#   docker compose up -d
#   docker compose exec app composer install
#   docker compose exec app php artisan key:generate
#   docker compose exec app php artisan migrate --seed
#   docker compose exec app npm install && docker compose exec app npm run dev
# App:  http://localhost:8080     Vite HMR: 5173     Postgres (host): 5544

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coffee_pos
      POSTGRES_USER: pos
      POSTGRES_PASSWORD: secret
    ports:
      - "5544:5432"          # host access for GUI tools; app uses the internal 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d   # runs once on a fresh volume (creates coffee_pos_test)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos -d coffee_pos"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:                        # PHP 8.5 + Node 20 + Composer (php-fpm on :9000)
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"          # Vite dev server / HMR
    depends_on:
      db:
        condition: service_healthy

  web:                        # nginx serving public/, proxying PHP to app:9000
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  pgdata:
